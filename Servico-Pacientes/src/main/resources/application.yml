spring:
  application:
    name: Servico-Pacientes

  datasource:
    url: jdbc:postgresql://localhost:5432/db_pacientes-healthsys
    username: adm
    password: adm
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      # Opcoes: update, create, create-drop, validate, none
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true